---
name: main

on:
  push: # All branches and tags

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # CI — lint & test on all three platforms for every push.
  # ---------------------------------------------------------------------------
  ci:
    name: Lint & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Disabled for now until we have a more complete codebase to lint.
      # - name: Lint with ruff
      #   run: ruff check soundcraftuisc test

      - name: Run tests
        run: pytest test

  # ---------------------------------------------------------------------------
  # Build — produce a native single-file binary on each platform.
  # Runs only on release/* tags.
  # ---------------------------------------------------------------------------
  build:
    name: Build binary (${{ matrix.os }})
    needs: ci
    if: startsWith(github.ref, 'refs/tags/release/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: soundcraftuisc
            asset_name: soundcraftuisc-linux
          - os: macos-latest
            artifact_name: soundcraftuisc
            asset_name: soundcraftuisc-macos
          - os: windows-latest
            artifact_name: soundcraftuisc.exe
            asset_name: soundcraftuisc-windows.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build with PyInstaller
        run: pyinstaller soundcraftuisc.spec

      - name: Rename binary to asset name
        shell: bash
        run: mv dist/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  # ---------------------------------------------------------------------------
  # Release — create a GitHub Release and attach all three binaries.
  # Runs only on release/* tags, after all builds succeed.
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/release/')
    runs-on: ubuntu-latest

    permissions:
      contents: write # required to create releases and upload assets

    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/soundcraftuisc-linux/soundcraftuisc-linux
            dist/soundcraftuisc-macos/soundcraftuisc-macos
            dist/soundcraftuisc-windows.exe/soundcraftuisc-windows.exe

  # ---------------------------------------------------------------------------
  # PyPI publish — disabled until the package is registered on PyPI.
  # To enable: register the package at https://pypi.org, add a PYPI_API_TOKEN
  # repository secret, and uncomment the job below (removing the `if: false`
  # guard or restructuring as needed).
  # ---------------------------------------------------------------------------
  # publish:
  #   name: Publish to PyPI
  #   needs: ci
  #   runs-on: ubuntu-latest
  #   if: startsWith(github.ref, 'refs/tags/')
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-python@v5
  #       with:
  #         python-version: '3.11'
  #     - run: pip install build twine
  #     - run: python -m build
  #     - run: twine upload dist/*
  #       env:
  #         TWINE_USERNAME: __token__
  #         TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
